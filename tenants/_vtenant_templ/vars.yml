# -----------------------------------------------------------------------------
# Operating system and Kubernetes
# -----------------------------------------------------------------------------
# OS installation, RKE2, Harvester, proxy, and manifest-related configuration.
install_rke2_version: v1.27.12+rke2r1
os_bond: 'true'
os_type: linux
proxys:
- 'http_proxy: "http://10.128.31.33:81"'
- 'https_proxy: "http://10.128.31.33:81"'
rke2_config:
  selinux: true
  write-kubeconfig-mode: '0640'

# -----------------------------------------------------------------------------
# Management access, DNS, and remaining overrides
# -----------------------------------------------------------------------------
# Tenant-local credentials, DNS, and values that intentionally override shared defaults.
dhcp_timeout: 60
gateway_mgmt: '{{ t_ib_network_prefix }}.1'
lun_busy_retry_count: 15
netmask_mgmt: '{{ t_ib_network_netmask }}'
primary_dns_mgmt: '{{ dns_servers[0].ip_address }}'
secondary_dns_mgmt: '{{ dns_servers[1].ip_address }}'
t_name_of_local_user: winterlinde
t_password_for_local_user: CHANGE_ME_LOCAL_USER_PASSWORD  # Replace only in a private deployment overlay.
tcp_connection_time_out: 15

