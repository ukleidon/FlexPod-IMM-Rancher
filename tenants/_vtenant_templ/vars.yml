---
# Tenant-specific overrides for winterlinde.
# Shared generated defaults are in group_vars/tenant_defaults.yml.
# Keep tenant identity, VLAN IDs, CIDRs, credentials, and API key references here for independent configure/unconfigure.
# See docs/tenants/README.md and docs/tenants/new-tenant.md.

# -----------------------------------------------------------------------------
# Tenant identity and lifecycle
# -----------------------------------------------------------------------------
# Selects the tenant and controls configure/unconfigure behavior. Keep these values tenant-local.
configure_local: 'true'
lan_state: present
tenant_name: winterlinde
tenant_type: virtual
tid: '17'

# -----------------------------------------------------------------------------
# Intersight access and organization
# -----------------------------------------------------------------------------
# Tenant API material and Intersight organization overrides. Do not move secrets into shared defaults.
api_key_id: CHANGE_ME_INTERSIGHT_API_KEY_ID  # Replace only in a private deployment overlay.
api_private_key: Keys/CHANGE_ME_INTERSIGHT_SECRET_KEY.txt  # Replace only in a private deployment overlay.
num_profiles: 3
org_name: '{{ tenant_name if (SMT == true) else organization }}'
prefix: '{{ tenant_name }}'

# -----------------------------------------------------------------------------
# Tenant VLANs and network CIDRs
# -----------------------------------------------------------------------------
# Layer-2 IDs and Layer-3 prefixes unique to this tenant. These must not collide with other tenants.
t_access_network_mask: '{{ t_ib_network_mask }}'
t_access_network_netmask: '{{ t_ib_network_netmask }}'
t_access_network_prefix: '{{ t_ib_network_prefix }}'
t_access_vlan_id: '{{ t_ib_vlan_id }}'
t_access_vlan_name: '{{ tenant_name }}-Access-Traffic'
t_access_vlans_list: '{{ t_access_vlan_id }}'
t_all_vlans_list: '{{ t_ib_vlan_id }},{{ t_access_vlan_id }},{{ t_nfs_vlan_id }},{{ t_iscsiA_vlan_id }},{{ t_iscsiB_vlan_id
  }}'
t_ib_mgmt_vlan_list:
- name: '{{ t_ib_vlan_name }}'
  id: '{{ t_ib_vlan_id }}'
  native: 'no'
  state: '{{lan_state}}'
t_ib_network_mask: 24
t_ib_network_netmask: 255.255.255.0
t_ib_network_prefix: 172.16.70
t_ib_vlan_id: 340
t_ib_vlan_name: '{{ tenant_name }}-Management_LAN'
t_iscsiA_network_mask: '{{ t_nfs_network_mask }}'
t_iscsiA_network_netmask: '{{ t_nfs_network_netmask }}'
t_iscsiA_network_prefix: '{{ t_nfs_network_prefix }}'
t_iscsiA_vlan_id: '{{ t_nfs_vlan_id }}'
t_iscsiA_vlan_name: '{{ tenant_name }}-iSCSI-A'
t_iscsiB_network_mask: '{{ t_nfs_network_mask }}'
t_iscsiB_network_netmask: '{{ t_nfs_network_netmask }}'
t_iscsiB_network_prefix: '{{ t_nfs_network_prefix }}'
t_iscsiB_vlan_id: '{{ t_nfs_vlan_id }}'
t_iscsiB_vlan_name: '{{ tenant_name }}-iSCSI-B'
t_mgmt_vlans_list: '{{ t_ib_vlan_id }},{{ t_access_vlan_id }}'
t_nfs_network_mask: 24
t_nfs_network_netmask: 255.255.255.0
t_nfs_network_prefix: 172.16.71
t_nfs_vlan_id: 341
t_nfs_vlan_name: '{{ tenant_name }}-NFS'
t_remaining_vlan_list:
- name: '{{ t_access_vlan_name }}'
  id: '{{ t_access_vlan_id }}'
  native: 'no'
  state: '{{lan_state}}'
t_storage_vlan_list:
- name: '{{ t_nfs_vlan_name }}'
  id: '{{ t_nfs_vlan_id }}'
  native: 'no'
  storage_protocol: NFS
  state: '{{lan_state}}'
t_storage_vlans_list: '{{ t_ib_vlan_id }},{{ t_nfs_vlan_id }},{{ t_iscsiA_vlan_id }},{{ t_iscsiB_vlan_id }}'
t_svi_list:
- name: '{{ t_ib_vlan_id }}'
  vrf: '{{ tenant_name }}'
  address: '{{ t_ib_network_prefix}}.{{ baseIP }}/{{ t_ib_network_mask }}'
  hsrp: '{{ t_ib_network_prefix}}.1'
- name: '{{ t_iscsiA_vlan_id }}'
  vrf: '{{ tenant_name }}'
  address: '{{ t_iscsiA_network_prefix }}.{{ baseIP }}/{{ t_iscsiA_network_mask }}'
  hsrp: '{{ t_iscsiA_network_prefix }}.1'
- name: '{{ t_iscsiB_vlan_id }}'
  vrf: '{{ tenant_name }}'
  address: '{{ t_iscsiB_network_prefix }}.{{ baseIP }}/{{ t_iscsiB_network_mask }}'
  hsrp: '{{ t_iscsiB_network_prefix }}.1'
- name: '{{ t_nfs_vlan_id }}'
  vrf: '{{ tenant_name }}'
  address: '{{ t_nfs_network_prefix }}.{{ baseIP }}/{{ t_nfs_network_mask }}'
  hsrp: '{{ t_nfs_network_prefix }}.1'
- name: '{{ t_access_vlan_id }}'
  vrf: '{{ tenant_name }}'
  address: '{{ t_access_network_prefix }}.{{ baseIP }}/{{ t_access_network_mask }}'
  hsrp: '{{ t_access_network_prefix }}.1'

# -----------------------------------------------------------------------------
# ONTAP SVM, storage, and LIFs
# -----------------------------------------------------------------------------
# Storage-facing values for SVMs, LIFs, initiators, and storage-side protocol settings.
