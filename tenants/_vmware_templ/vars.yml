---
# Tenant-specific overrides for test01.
# Shared generated defaults are in group_vars/tenant_defaults.yml.
# Keep tenant identity, VLAN IDs, CIDRs, credentials, and API key references here for independent configure/unconfigure.
# See docs/tenants/README.md and docs/tenants/new-tenant.md.

# -----------------------------------------------------------------------------
# Tenant identity and lifecycle
# -----------------------------------------------------------------------------
# Selects the tenant and controls configure/unconfigure behavior. Keep these values tenant-local.
lan_state: present
tenant_name: test01

# -----------------------------------------------------------------------------
# Tenant VLANs and network CIDRs
# -----------------------------------------------------------------------------
# Layer-2 IDs and Layer-3 prefixes unique to this tenant. These must not collide with other tenants.
t_access_network_mask: 24
t_access_network_prefix: 172.18.4
t_access_vlan_id: '{{ t_ib_vlan_id + 4 }}'
t_access_vlan_name: '{{ tenant_name }}-Access-Traffic'
t_access_vlans_list: '{{ t_access_vlan_id }}'
t_all_vlans_list: '{{ oob_vlan_id }},{{ t_ib_vlan_id }},{{ t_vm_vlan_id }},{{ t_nfs_vlan_id }},{{ t_vmotion_vlan_id }},{{
  t_iscsiA_vlan_id }},{{ t_iscsiB_vlan_id }},{{ t_nvme_tcpA_vlan_id }},{{ t_nvme_tcpB_vlan_id }}'
t_ib_mgmt_vlan_list:
- name: '{{ t_ib_vlan_name }}'
  id: '{{ t_ib_vlan_id }}'
  native: 'no'
  state: '{{lan_state}}'
t_ib_network_mask: 24
t_ib_network_prefix: 172.18.0.
t_ib_vlan_id: 300
t_ib_vlan_name: '{{ tenant_name }}-Management_LAN'
t_iscsiA_network_mask: 24
t_iscsiA_network_prefix: 172.18.1
t_iscsiA_vlan_id: '{{ t_ib_vlan_id + 1 }}'
t_iscsiA_vlan_name: '{{ tenant_name }}-iSCSI-A'
t_iscsiB_network_mask: 24
t_iscsiB_network_prefix: 172.18.2
t_iscsiB_vlan_id: '{{ t_ib_vlan_id + 2 }}'
t_iscsiB_vlan_name: '{{ tenant_name }}-iSCSI-B'
t_mgmt_vlans_list: '{{ oob_vlan_id }},{{ t_ib_vlan_id }},{{ t_vm_vlan_id }}'
t_nfs_network_mask: 24
t_nfs_network_prefix: 172.18.3
t_nfs_vlan_id: '{{ t_ib_vlan_id + 3 }}'
t_nfs_vlan_name: '{{ tenant_name }}-NFS'
t_nvme_tcpA_network_prefix: 172.18.7
t_nvme_tcpA_vlan_id: '{{ t_ib_vlan_id + 7 }}'
t_nvme_tcpA_vlan_name: '{{ tenant_name }}-Infra-NVMe-TCP-A'
t_nvme_tcpB_network_mask: 24
t_nvme_tcpB_network_prefix: 172.18.8
t_nvme_tcpB_vlan_id: '{{ t_ib_vlan_id + 8 }}'
t_nvme_tcpB_vlan_name: '{{ tenant_name }}-Infra-NVMe-TCP-B'
t_remaining_vlan_list:
- name: '{{ t_vm_vlan_name }}'
  id: '{{ t_vm_vlan_id }}'
  native: 'no'
  state: '{{lan_state}}'
- name: '{{ t_vmotion_vlan_name }}'
  id: '{{ t_vmotion_vlan_id }}'
  native: 'no'
  state: '{{lan_state}}'
t_storage_vlan_list:
- name: '{{ t_nfs_vlan_name }}'
  id: '{{ t_nfs_vlan_id }}'
  native: 'no'
  storage_protocol: NFS
  state: '{{lan_state}}'
- name: '{{ t_iscsiA_vlan_name }}'
  id: '{{ t_iscsiA_vlan_id }}'
  native: 'no'
  storage_protocol: iSCSI
  fabric: A
  state: '{{lan_state}}'
- name: '{{ t_iscsiB_vlan_name }}'
  id: '{{ t_iscsiB_vlan_id }}'
  native: 'no'
  storage_protocol: iSCSI
  fabric: B
  state: '{{lan_state}}'
- name: '{{ t_nvme_tcpA_vlan_name }}'
  id: '{{ t_nvme_tcpA_vlan_id }}'
  native: 'no'
  storage_protocol: NVMe
  fabric: A
  state: '{{lan_state}}'
- name: '{{ t_nvme_tcpB_vlan_name }}'
  id: '{{ t_nvme_tcpB_vlan_id }}'
  native: 'no'
  storage_protocol: NVMe
  fabric: B
  state: '{{lan_state}}'
t_storage_vlans_list: '{{ t_ib_vlan_id }},{{ t_nfs_vlan_id }},{{ t_iscsiA_vlan_id }},{{ t_iscsiB_vlan_id }},{{ t_nvme_tcpA_vlan_id
  }},{{ t_nvme_tcpB_vlan_id }}'
t_svi_list:
- name: '{{ t_ib_vlan_id }}'
  vrf: vmware
  address: '{{ t_ib_network_prefix}}.{{ baseIP }}/{{ t_ib_network_mask }}'
  hsrp: '{{ t_ib_network_prefix}}.1'
- name: '{{ t_iscsiA_vlan_id }}'
  vrf: vmware
  address: '{{ t_iscsiA_network_prefix }}.{{ baseIP }}/{{ t_iscsiA_network_mask }}'
  hsrp: '{{ t_iscsiA_network_prefix }}.1'
- name: '{{ t_iscsiB_vlan_id }}'
  vrf: vmware
  address: '{{ t_iscsiB_network_prefix }}.{{ baseIP }}/{{ t_iscsiB_network_mask }}'
  hsrp: '{{ t_iscsiB_network_prefix }}.1'
- name: '{{ t_nfs_vlan_id }}'
  vrf: vmware
  address: '{{ t_nfs_network_prefix }}.{{ baseIP }}/{{ t_nfs_network_mask }}'
  hsrp: '{{ t_nfs_network_prefix }}.1'
- name: '{{ t_access_vlan_id }}'
  vrf: vmware
  address: '{{ t_access_network_prefix }}.{{ baseIP }}/{{ t_access_network_mask }}'
  hsrp: '{{ t_access_network_prefix }}.1'
t_vm_network_mask: 24
t_vm_network_prefix: 172.18.5
t_vm_vlan_id: '{{ t_ib_vlan_id + 5 }}'
t_vm_vlan_name: '{{ tenant_name }}-VM-Traffic'
t_vmotion_network_mask: 24
t_vmotion_network_prefix: 172.18.6
t_vmotion_vlan_id: '{{ t_ib_vlan_id + 6 }}'
t_vmotion_vlan_name: '{{ tenant_name }}-vMotion'
t_vsan_A_fcoe_vlan: 101
t_vsan_B_fcoe_vlan: 102

# -----------------------------------------------------------------------------
# ONTAP SVM, storage, and LIFs
# -----------------------------------------------------------------------------
# Storage-facing values for SVMs, LIFs, initiators, and storage-side protocol settings.
aggr_prefix: c250_02
cluster: c250-02
esxi_nfs_vlan: '{{ t_nfs_vlan_id }}'
fc_nvme_lif_01a: 20:06:00:a0:98:e2:17:ca
fc_nvme_lif_01b: 20:07:00:a0:98:e2:17:ca
fc_nvme_lif_02a: 20:08:00:a0:98:e2:17:ca
fc_nvme_lif_02b: 20:09:00:a0:98:e2:17:ca
fcp_lif_01a: 20:01:00:a0:98:e2:17:ca
fcp_lif_01b: 20:02:00:a0:98:e2:17:ca
fcp_lif_02a: 20:03:00:a0:98:e2:17:ca
fcp_lif_02b: 20:04:00:a0:98:e2:17:ca
iscsi_esxi_hosts:
- hostname: aa02-esxi-2
  iscsi_iqn: iqn.2010-11.com.flexpod:aa02-ucshost:2
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-2
- hostname: aa02-esxi-4
  iscsi_iqn: iqn.2010-11.com.flexpod:aa02-ucshost:1
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-4
- hostname: aa02-esxi-6
  iscsi_iqn: iqn.2010-11.com.flexpod:aa02-ucshost:3
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-6
iscsi_lif_01a: 192.168.10.31
iscsi_lif_01b: 192.168.20.31
iscsi_lif_02a: 192.168.10.32
iscsi_lif_02b: 192.168.20.32
iscsi_nvme_tcp_dvs_name: iSCSI-NVMe-TCP-vDS
iscsi_nvme_tcp_vds_vlan_list:
- name: '{{ t_iscsiA_vlan_name }}'
  portgroup_name: '{{ t_iscsiA_vlan_name }}'
  id: '0'
  active_uplinks:
  - Uplink 1
  standby_uplinks: []
- name: '{{ t_iscsiB_vlan_name }}'
  portgroup_name: '{{ t_iscsiB_vlan_name }}'
  id: '0'
  active_uplinks:
  - Uplink 2
  standby_uplinks: []
- name: '{{ t_nvme_tcpA_vlan_name }}'
  portgroup_name: '{{ t_nvme_tcpA_vlan_name }}'
  id: '{{ t_nvme_tcpA_vlan_id }}'
  active_uplinks:
  - Uplink 1
  standby_uplinks: []
- name: '{{ t_nvme_tcpB_vlan_name }}'
  portgroup_name: '{{ t_nvme_tcpB_vlan_name }}'
  id: '{{ t_nvme_tcpB_vlan_id }}'
  active_uplinks:
  - Uplink 2
  standby_uplinks: []
nfs_lif_01: 192.168.3.103
nfs_lif_02: 192.168.3.104
nfs_portgroup: VMKernel-Infra-NFS
storage_iscsi_IQN: iqn.1992-08.com.netapp:sn.c4f9c442816c11edb42400a098e217cb:vs.3
svm_node_specs:
- node_name: '{{ cluster }}n1'
  nfs_lifs:
    name: '{{ tenant_name }}-nfs-lif-01a'
    address: '{{ nfs_lif_01 }}'
    netmask: 255.255.255.0
  fcp_lifs:
  - name: '{{ tenant_name }}-fcp-lif-01a'
    home_port: 5a
    fabric: A
  - name: '{{ tenant_name }}-fcp-lif-01b'
    home_port: 5b
    fabric: B
  fc-nvme_lifs:
  - name: '{{ tenant_name }}-fc-nvme-lif-01a'
    home_port: 2a
    fabric: A
  - name: '{{ tenant_name }}-fc-nvme-lif-01b'
    home_port: 2b
    fabric: B
  iscsi_lifs:
  - name: '{{ tenant_name }}-iscsi-lif-01a'
    address: '{{ iscsi_lif_01a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-iscsi-lif-01b'
    address: '{{ iscsi_lif_01b }}'
    netmask: 255.255.255.0
    fabric: B
  nvme_tcp_lifs:
  - name: '{{ tenant_name }}-nvme-tcp-lif-01a'
    address: '{{ nvme_lif_01a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-nvme-tcp-lif-01b'
    address: '{{ nvme_lif_01b }}'
    netmask: 255.255.255.0
    fabric: B
- node_name: '{{ cluster }}n2'
  nfs_lifs:
    name: '{{ tenant_name }}-nfs-lif-02b'
    address: '{{ nfs_lif_02 }}'
    netmask: 255.255.255.0
  fcp_lifs:
  - name: '{{ tenant_name }}-fcp-lif-02a'
    home_port: 5a
    fabric: A
  - name: '{{ tenant_name }}-fcp-lif-02b'
    home_port: 5b
    fabric: B
  fc-nvme_lifs:
  - name: '{{ tenant_name }}-fc-nvme-lif-02a'
    home_port: 2a
    fabric: A
  - name: '{{ tenant_name }}-fc-nvme-lif-02b'
    home_port: 2b
    fabric: B
  iscsi_lifs:
  - name: '{{ tenant_name }}-iscsi-lif-02a'
    address: '{{ iscsi_lif_02a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-iscsi-lif-02b'
    address: '{{ iscsi_lif_02b }}'
    netmask: 255.255.255.0
    fabric: B
  nvme_tcp_lifs:
  - name: '{{ tenant_name }}-nvme-tcp-lif-02a'
    address: '{{ nvme_lif_02a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-nvme-tcp-lif-02b'
    address: '{{ nvme_lif_02b }}'
    netmask: 255.255.255.0
    fabric: B
svm_specs:
  svm_name: '{{ tenant_name }}_svm'
  svm_root_vol: '{{ tenant_name }}_svm_root'
  allowed_protocols:
  - nfs
  - iscsi
  data_protocol: nfs
  client_match: '{{ t_nfs_network_prefix }}.0/{{ t_nfs_network_mask }}'
  data_volumes_file:
  - name: '{{tenant_name}}_datastore'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n2_aggr1'
  - name: '{{tenant_name}}_swap'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n1_aggr1'
  - name: '{{tenant_name}}_vCLS'
    size: 100
    residing_aggr: '{{ aggr_prefix }}n2_aggr1'
  data_volumes_block:
  - name: '{{tenant_name}}_boot'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n1_aggr1'
  nvme_subsystem: nvme_infra_hosts
  boot_luns_iscsi:
    size: 128
    residing_vol: '{{tenant_name}}_boot'
  svm_mgmt_lif:
    home_node: '{{ cluster }}n2'
    address: '{{ t_ib_network_prefix }}.101'
    netmask: 255.255.255.0
    gateway: '{{ t_ib_network_prefix }}.1'
    lif_name: '{{ tenant_name }}-svm-mgmt'
  vsadmin_password: CHANGE_ME_SVM_ADMIN_PASSWORD  # Replace only in a private deployment overlay.
  os_type: linux
  dns_server_svm:
  - '{{ dns_servers[0].ip_address }}'
  dns_domain_svm: '{{ dns_domain_name }}'
  svm_login_banner: This SVM is reserved for authorized users only!
  audit_log_volume_specs:
    name: '{{tenant_name}}_audit_log'
    size: 50
    residing_aggr: c250_01n1_aggr1
vcenter_cluster: FlexPod-Management

# -----------------------------------------------------------------------------
# UCS pools, policies, and boot media
# -----------------------------------------------------------------------------
# Tenant-specific Intersight names, pool starts, WWPN/WWNN/MAC starts, and vMedia overrides.
t_vsan_A_id: 101
t_vsan_A_name: FlexPod-Fabric-A
t_vsan_B_id: 102
t_vsan_B_name: FlexPod-Fabric-B

# -----------------------------------------------------------------------------
# Management access, DNS, and remaining overrides
# -----------------------------------------------------------------------------
# Tenant-local credentials, DNS, and values that intentionally override shared defaults.
dv_operation: both
dv_protocol: lldp
dv_uplink: '2'
dv_version: 7.0.3
dvs_name: vDS0
esxi_password: '{{ ansible_ssh_pass }}'
esxi_username: root
fc_esxi_hosts:
- hostname: aa02-esxi-1
  fcp_a_wwpn: 20:00:00:25:b5:a2:0a:00
  fcp_b_wwpn: 20:00:00:25:b5:a2:0b:00
  fc_nvme_a_wwpn: 20:00:00:25:b5:a2:0a:01
  fc_nvme_b_wwpn: 20:00:00:25:b5:a2:0b:01
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-1
- hostname: aa02-esxi-3
  fcp_a_wwpn: 20:00:00:25:b5:a2:0a:02
  fcp_b_wwpn: 20:00:00:25:b5:a2:0b:02
  fc_nvme_a_wwpn: 20:00:00:25:b5:a2:0a:03
  fc_nvme_b_wwpn: 20:00:00:25:b5:a2:0b:03
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-3
- hostname: aa02-esxi-5
  fcp_a_wwpn: 20:00:00:25:b5:a2:0a:05
  fcp_b_wwpn: 20:00:00:25:b5:a2:0b:04
  fc_nvme_a_wwpn: 20:00:00:25:b5:a2:0a:04
  fc_nvme_b_wwpn: 20:00:00:25:b5:a2:0b:05
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:aa02-esxi-5
oob_mgmt_portgroup: OOB-MGMT Network
oob_mgmt_vlan: '{{ oob_vlan_id }}'
vcenter_dc: FlexPod-DC
vcenter_hostname: 10.102.1.100
vcenter_password: CHANGE_ME_VCENTER_PASSWORD  # Replace only in a private deployment overlay.
vcenter_username: administrator@vsphere.local
vds0_vlan_list:
- name: '{{ t_vm_vlan_name }}'
  portgroup_name: '{{ t_vm_vlan_name }}'
  id: '{{ t_vm_vlan_id }}'
  active_uplinks:
  - Uplink 1
  - Uplink 2
  standby_uplinks: []
- name: '{{ t_vmotion_vlan_name }}'
  portgroup_name: '{{ t_vmotion_vlan_name }}'
  id: '{{ t_vmotion_vlan_id }}'
  active_uplinks: Uplink 2
  standby_uplinks: Uplink 1
