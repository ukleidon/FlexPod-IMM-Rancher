---
# Tenant-specific overrides for gpu.
# Shared generated defaults are in group_vars/tenant_defaults.yml.
# Keep tenant identity, VLAN IDs, CIDRs, credentials, and API key references here for independent configure/unconfigure.
# See docs/tenants/README.md and docs/tenants/new-tenant.md.

# -----------------------------------------------------------------------------
# Tenant identity and lifecycle
# -----------------------------------------------------------------------------
# Selects the tenant and controls configure/unconfigure behavior. Keep these values tenant-local.
configure_local: 'false'
harvester_context: harvester0
lan_state: present
tenant_name: gpu
tid: '02'
vtenants: false

# -----------------------------------------------------------------------------
# Intersight access and organization
# -----------------------------------------------------------------------------
# Tenant API material and Intersight organization overrides. Do not move secrets into shared defaults.
api_key_id: CHANGE_ME_INTERSIGHT_API_KEY_ID  # Replace only in a private deployment overlay.
api_private_key: Keys/CHANGE_ME_INTERSIGHT_SECRET_KEY.txt  # Replace only in a private deployment overlay.
num_profiles: 0
org_name: '{{ tenant_name }}'
prefix: '{{ tenant_name }}'

# -----------------------------------------------------------------------------
# Tenant VLANs and network CIDRs
# -----------------------------------------------------------------------------
# Layer-2 IDs and Layer-3 prefixes unique to this tenant. These must not collide with other tenants.
t_access_network_mask: 24
t_access_network_netmask: 255.255.255.0
t_access_network_prefix: 172.17.4
t_access_vlan_id: 204
t_access_vlan_name: '{{ tenant_name }}-Access-Traffic'
t_all_vlans_list: '{{ all_vlans_list }},{{ t_mgmt_vlans_list }},{{ t_access_vlans_list }},{{ t_storage_vlans_list }}'
t_ib_network_mask: 24
t_ib_network_netmask: 255.255.255.0
t_ib_network_prefix: 172.17.0
t_ib_vlan_id: 200
t_iscsiA_network_mask: 24
t_iscsiA_network_netmask: 255.255.255.0
t_iscsiA_network_prefix: 172.17.1
t_iscsiA_vlan_id: 201
t_iscsiB_network_mask: 24
t_iscsiB_network_netmask: 255.255.255.0
t_iscsiB_network_prefix: 172.17.2
t_iscsiB_vlan_id: 202
t_nfs_network_prefix: 172.17.3
t_nfs_vlan_id: 203
t_nvme_tcpA_network_mask: 24
t_nvme_tcpA_network_netmask: 255.255.255.0
t_nvme_tcpA_network_prefix: 172.17.5
t_nvme_tcpA_vlan_id: 205
t_nvme_tcpA_vlan_name: '{{ tenant_name }}-Infra-NVMe-TCP-A'
t_nvme_tcpB_network_mask: 24
t_nvme_tcpB_network_netmask: 255.255.255.0
t_nvme_tcpB_network_prefix: 172.17.6
t_nvme_tcpB_vlan_id: 206
t_nvme_tcpB_vlan_name: '{{ tenant_name }}-Infra-NVMe-TCP-B'
t_storage_vlan_list:
- name: '{{ t_nfs_vlan_name }}'
  id: '{{ t_nfs_vlan_id }}'
  native: 'no'
  storage_protocol: NFS
  state: '{{lan_state}}'
- name: '{{ t_iscsiA_vlan_name }}'
  id: '{{ t_iscsiA_vlan_id }}'
  native: 'no'
  storage_protocol: iSCSI
  fabric: A
  state: '{{lan_state}}'
- name: '{{ t_iscsiB_vlan_name }}'
  id: '{{ t_iscsiB_vlan_id }}'
  native: 'no'
  storage_protocol: iSCSI
  fabric: B
  state: '{{lan_state}}'

# -----------------------------------------------------------------------------
# ONTAP SVM, storage, and LIFs
# -----------------------------------------------------------------------------
# Storage-facing values for SVMs, LIFs, initiators, and storage-side protocol settings.
fc_nvme_lif_01a: 20:06:00:a0:98:e2:17:ca
fc_nvme_lif_01b: 20:07:00:a0:98:e2:17:ca
fc_nvme_lif_02a: 20:08:00:a0:98:e2:17:ca
fc_nvme_lif_02b: 20:09:00:a0:98:e2:17:ca
fcp_lif_01a: 20:26:d0:39:ea:29:ce:d4
fcp_lif_01b: 20:25:d0:39:ea:29:ce:d4
fcp_lif_02a: 20:23:d0:39:ea:29:ce:d4
fcp_lif_02b: 20:24:d0:39:ea:29:ce:d4
iscsi_lif_01a: '{{ t_iscsiA_network_prefix }}.103'
iscsi_lif_01b: '{{ t_iscsiB_network_prefix }}.103'
iscsi_lif_02a: '{{ t_iscsiA_network_prefix }}.104'
iscsi_lif_02b: '{{ t_iscsiB_network_prefix }}.104'
name_of_iscsi_a_vnic: 02-iSCSI-{{ vic_type }}-A
name_of_iscsi_b_vnic: 03-iSCSI-{{ vic_type }}-B
name_of_iscsi_vnic_1: 00-iscsi-access-{{ vic_type }}-A
name_of_iscsi_vnic_2: 01-iscsi-storage-{{ vic_type }}-B
nfs_lif_01: '{{ t_nfs_network_prefix }}.103'
nfs_lif_02: '{{ t_nfs_network_prefix }}.104'
nvme_lif_01a: '{{ t_nvme_tcpA_network_prefix }}.103'
nvme_lif_01b: '{{ t_nvme_tcpB_network_prefix }}.103'
nvme_lif_02a: '{{ t_nvme_tcpA_network_prefix }}.104'
nvme_lif_02b: '{{ t_nvme_tcpB_network_prefix }}.104'
size_of_ip_pool_iscsi_a: 128
size_of_ip_pool_iscsi_b: 128
storage_iscsi_IQN: iqn.1992-08.com.netapp:sn.001e40d9057711efaa2ad039ea561760:vs.7
svm_node_specs:
- node_name: '{{ cluster_name }}n1'
  nfs_lifs:
    name: '{{ tenant_name }}-nfs-lif-01a'
    address: '{{ nfs_lif_01 }}'
    netmask: 255.255.255.0
  fcp_lifs:
  - name: '{{ tenant_name }}-fcp-lif-01a'
    home_port: 5a
    fabric: A
  - name: '{{ tenant_name }}-fcp-lif-01b'
    home_port: 5b
    fabric: B
  fc-nvme_lifs:
  - name: '{{ tenant_name }}-fc-nvme-lif-01a'
    home_port: 2a
    fabric: A
  - name: '{{ tenant_name }}-fc-nvme-lif-01b'
    home_port: 2b
    fabric: B
  iscsi_lifs:
  - name: '{{ tenant_name }}-iscsi-lif-01a'
    address: '{{ iscsi_lif_01a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-iscsi-lif-01b'
    address: '{{ iscsi_lif_01b }}'
    netmask: 255.255.255.0
    fabric: B
  nvme_tcp_lifs:
  - name: '{{ tenant_name }}-nvme-tcp-lif-01a'
    address: '{{ nvme_lif_01a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-nvme-tcp-lif-01b'
    address: '{{ nvme_lif_01b }}'
    netmask: 255.255.255.0
    fabric: B
- node_name: '{{ cluster_name }}n2'
  nfs_lifs:
    name: '{{ tenant_name }}-nfs-lif-02b'
    address: '{{ nfs_lif_02 }}'
    netmask: 255.255.255.0
  fcp_lifs:
  - name: '{{ tenant_name }}-fcp-lif-02a'
    home_port: 5a
    fabric: A
  - name: '{{ tenant_name }}-fcp-lif-02b'
    home_port: 5b
    fabric: B
  fc-nvme_lifs:
  - name: '{{ tenant_name }}-fc-nvme-lif-02a'
    home_port: 2a
    fabric: A
  - name: '{{ tenant_name }}-fc-nvme-lif-02b'
    home_port: 2b
    fabric: B
  iscsi_lifs:
  - name: '{{ tenant_name }}-iscsi-lif-02a'
    address: '{{ iscsi_lif_02a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-iscsi-lif-02b'
    address: '{{ iscsi_lif_02b }}'
    netmask: 255.255.255.0
    fabric: B
  nvme_tcp_lifs:
  - name: '{{ tenant_name }}-nvme-tcp-lif-02a'
    address: '{{ nvme_lif_02a }}'
    netmask: 255.255.255.0
    fabric: A
  - name: '{{ tenant_name }}-nvme-tcp-lif-02b'
    address: '{{ nvme_lif_02b }}'
    netmask: 255.255.255.0
    fabric: B
svm_specs:
  svm_name: '{{ tenant_name }}_svm'
  svm_root_vol: '{{ tenant_name }}_svm_root'
  allowed_protocols:
  - nfs
  - iscsi
  data_protocol: nfs
  client_match: '{{ t_nfs_network_prefix }}.0/{{ t_nfs_network_mask }}'
  data_volumes_file:
  - name: '{{tenant_name}}_datastore'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n2_aggr1'
  data_volumes_block:
  - name: '{{tenant_name}}_boot'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n2_aggr1'
  - name: '{{tenant_name}}_data'
    size: 1024
    residing_aggr: '{{ aggr_prefix }}n2_aggr1'
  nvme_subsystem: nvme_infra_hosts
  boot_luns_iscsi:
    size: 400
    residing_vol: '{{tenant_name}}_boot'
  data_luns_iscsi:
    name: gpu_1_data
    size: 1024
    residing_vol: gpu_1_data
    host: gpu-01
  svm_mgmt_lif:
    home_node: '{{cluster_name}}n2'
    address: '{{t_ib_network_prefix}}.101'
    netmask: '{{t_ib_network_netmask}}'
    gateway: '{{ t_ib_network_prefix }}.1'
    lif_name: '{{ tenant_name }}-svm-mgmt'
  vsadmin_password: CHANGE_ME_SVM_ADMIN_PASSWORD  # Replace only in a private deployment overlay.
  os_type: linux
  dns_server_svm:
  - '{{ dns_servers[0].ip_address }}'
  dns_domain_svm: '{{ dns_domain_name }}'
  svm_login_banner: This SVM is reserved for authorized users only!
  audit_log_volume_specs:
    name: '{{tenant_name}}_audit_log'
    size: 50
    residing_aggr: '{{ aggr_prefix }}n1_aggr1'
t_iscsi_hosts:
- hostname: '{{ tenant_name }}-01'
  iscsi_iqn: iqn.2010-11.com.flexpod:{{ tenant_name }}-ucshost:1
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:{{ tenant_name }}-01
- hostname: '{{ tenant_name }}-02'
  iscsi_iqn: iqn.2010-11.com.flexpod:{{ tenant_name }}-ucshost:2
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:{{ tenant_name }}-02
- hostname: '{{ tenant_name }}-03'
  iscsi_iqn: iqn.2010-11.com.flexpod:{{ tenant_name }}-ucshost:3
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:{{ tenant_name }}-03
- hostname: '{{ tenant_name }}-04'
  iscsi_iqn: iqn.2010-11.com.flexpod:{{ tenant_name }}-ucshost:4
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:{{ tenant_name }}-04
- hostname: '{{ tenant_name }}-05'
  iscsi_iqn: iqn.2010-11.com.flexpod:{{ tenant_name }}-ucshost:5
  nvme_nqn: nqn.2014-08.com.cisco.flexpodb4:nvme:{{ tenant_name }}-05

# -----------------------------------------------------------------------------
# UCS pools, policies, and boot media
# -----------------------------------------------------------------------------
# Tenant-specific Intersight names, pool starts, WWPN/WWNN/MAC starts, and vMedia overrides.
description_of_bios_policy: '{{ description_of_m7_bios_policy }}'
description_of_m5_bios_policy: BIOS Policy for Performance Optimized Intel-based M5 Linux Servers
description_of_m6_bios_policy: BIOS Policy for Performance Optimized Intel-based M6 Linux Servers
description_of_m7_bios_policy: BIOS Policy for Performance Optimized {{ server_cpu_type }}-based M7 Linux Servers
description_of_network_group_policy_for_access: VLAN details of access interfaces to allow Mgmt and access traffic
ip_pool_start_for_management_access: '{{ t_ib_network_prefix }}.211'
mac_pool_start_on_fi_a: 00:25:B5:A0:01:00
mac_pool_start_on_fi_b: 00:25:B5:B0:01:00
name_of_bios_policy: '{{ name_of_m6_bios_policy }}'
name_of_fc_vnic_1: 00-fc-access-{{ vic_type }}-A
name_of_fc_vnic_2: 01-fc-storage-{{ vic_type }}-B
name_of_fc_vnic_4: '{{ prefix | lower}}-fc-????-{{ vic_type }}-B'
name_of_ip_pool_for_management_access: '{{ prefix }}-IB-MGMT-IP-Pool'
name_of_m5_bios_policy: '{{ prefix }}-{{ server_cpu_type }}-Intel-M5-Linux-BIOS'
name_of_m6_bios_policy: '{{ prefix }}-{{ server_cpu_type }}-M6-Linux-BIOS'
name_of_m7_bios_policy: '{{ prefix }}-{{ server_cpu_type }}-M7-Linux-BIOS'
oob_ip_pool_start_for_management_access: 172.16.5.250
oob_size_of_ip_pool_for_management_access: 5
size_of_ip_pool_for_management_access: 15
vmedia_file_location_cdd: http://172.16.4.105/Ubuntu2404.iso
vmedia_name_cdd: Ubuntu2404
vsan_A_name: '{{ tenant_name }}-FlexPod-Fabric-A'
vsan_B_name: '{{ tenant_name }}-FlexPod-Fabric-B'
wwnn_pool_start: 20:00:00:25:B5:00:00:00
wwpn_pool_start_on_san_a: 20:00:00:25:B5:A0:00:00
wwpn_pool_start_on_san_b: 20:00:00:25:B5:B0:00:00

# -----------------------------------------------------------------------------
# Operating system and Kubernetes
# -----------------------------------------------------------------------------
# OS installation, RKE2, Harvester, proxy, and manifest-related configuration.
install_k3s_version: v1.27.12+k3sr1
install_rke2_version: v1.27.12+rke2r1
os_bond: 'false'
proxys:
- 'http_proxy: "http://172.16.4.12:81"'
- 'https_proxy: "http://172.16.4.12:81"'
rke2_config:
  selinux: true
  write-kubeconfig-mode: '0640'

# -----------------------------------------------------------------------------
# Management access, DNS, and remaining overrides
# -----------------------------------------------------------------------------
# Tenant-local credentials, DNS, and values that intentionally override shared defaults.
ib_management_ip_pool_details: '{{ prefix }}-IB-MGMT-IP-Pool'
oob_gateway_mgmt: 172.16.4.1
oob_management_ip_pool_details: '{{ prefix }}-OOB-MGMT-IP-Pool'
oob_name_of_ip_pool_for_management_access: '{{ prefix }}-OOB-MGMT-IP-Pool'
oob_netmask_mgmt: 255.255.252.0
oob_primary_dns_mgmt: '{{ dns_servers[0].ip_address }}'
oob_secondary_dns_mgmt: '{{ dns_servers[1].ip_address }}'
primary_dns_mgmt: '{{ dns_servers[0].ip_address }}'
secondary_dns_mgmt: '{{ dns_servers[1].ip_address }}'
t_name_of_local_user: gpuadmin
t_password_for_local_user: CHANGE_ME_LOCAL_USER_PASSWORD  # Replace only in a private deployment overlay.

