---
#
# This playbook configures one tenant at a time. Use tags to run a phase
# explicitly: preflight, nexus_config, ontap_config, ucs_config, os_install,
# rke_install, or trident_install.
#
- name: Preflight tenant input and variable files
  hosts: localhost
  gather_facts: false
  roles:
    - role: common/tenant_preflight
  tags:
    - always
    - preflight

# Configure VLANs, VRF, and IP addresses for the tenant
- name: Configure tenant Nexus network
  hosts: nexus
  connection: network_cli
  gather_facts: false
  roles:
    - role: TENANT/env_vars
    - role: TENANT/nexus_config
    - role: TENANT/nexus_config_ip
    - role: TENANT/nexus_config_sg
    - role: TENANT/nexus_config_asa
  tags:
    - nexus_config
    - hardware_tenant

# Configure VLANs, LIFs, SVM, and LUNs for the tenant
- name: Configure tenant ONTAP storage
  hosts: ontap
    #serial: 1
  gather_facts: false
  connection: local
  roles:
    - role: TENANT/env_vars
    - role: TENANT/ontap_network
      tags: [ontap_network]
      when: not ansible_check_mode
    - role: TENANT/ontap_svm
      tags: [ontap_svm]
      when: not ansible_check_mode
    - role: TENANT/ontap_volumes
      tags: [ontap_volumes]
      when: not ansible_check_mode
    - role: TENANT/ontap_lifs
      tags: [ontap_lifs]
      when: not ansible_check_mode
    - role: TENANT/ontap_luns
      tags: [ontap_luns]
      when: not ansible_check_mode
    - role: TENANT/ontap_nvme
      tags: [ontap_nvme]
      when: not ansible_check_mode
  tags:
    - ontap_config
    - flexpod_config
    - hardware_tenant

# Create various pools, policies, and a server profile template
#
- name: Create Tenant in Intersight
  hosts: localhost
  gather_facts: false
  vars_files:
    - group_vars/ucs.yml
  roles:
    - role: TENANT/env_vars
    - role: TENANT/ucs_create_pools
      when: not ansible_check_mode
    - role: TENANT/ucs_create_server_policies
      when: not ansible_check_mode
    - role: TENANT/ucs_create_sp_template
      when: not ansible_check_mode
    #  - { role: TENANT/ucs_create_server }
  tags:
    - ucs_config
    - flexpod_config
    - hardware_tenant


#Execute the below ONTAP Role after installing and configuring ESXi Hosts
#- name: Configure ONTAP NVMe Setup and finalize ONTAP storage
#  hosts: ontap
#  gather_facts: False
