#  tags:
#  - ontap_config_part_2
#  - flexpod_config
#  - hardware_tenant

#
# Create Server Profiles from Template
#
- name: Create Server Profiles from Template
  hosts: localhost
  gather_facts: false
  vars_files:
    - group_vars/ucs.yml
  roles:
    - role: TENANT/env_vars
    - role: TENANT/ucs_create_server
      when: not ansible_check_mode
  tags:
    - os_install


#
# Install SUSE Linux
#
- name: Install SUSE Linux
  hosts: rke2_servers,rke2_agents,hosts
  become: true
  gather_facts: false
  roles:
    - role: TENANT/env_vars
    - role: TENANT/os_install_suse
      when: not ansible_check_mode
  tags:
    - os_install

#
# Prepare RKE2 Install behind proxy Server
#
- name: Prepare installation of Rancher RKE2 control nodes
  hosts: rke2_servers,rke2_agents
  become: true
  gather_facts: false
  roles:
    - role: rancher/env_vars
    - role: rancher/pre_rke_install
      when: not ansible_check_mode
  tags:
    - rke_install
    - rke_prepare
#
# Setup RKE2 Control-Nodes or Control-/Agent-Nodes
#
- name: Install RKE2 Controll node server
  hosts: rke2_servers
  any_errors_fatal: true
  become: true
  roles:
    - role: rancher/env_vars
    - role: rancher/rke2_server
      when: not ansible_check_mode
  serial: 1
  environment:
    http_proxy: http://172.16.4.12:81
    https_proxy: http://172.16.4.12:81
  tags:
    - rke_install
    - rke_server

#
# Setup RKE2 dedicated Agent-Nodes
#
- name: Install RKE2 dedicated agent nodes
  hosts: rke2_agents
  any_errors_fatal: true
  become: true
  roles:
    - role: rancher/rke2_agent
      when: not ansible_check_mode
  serial: 3
  tags:
    - rke_install
    - rke_agent
#
# Configure Astra Trident on K8s cluster and the storage backend
- name: Deploy NetApp Trident and Configure Trident Backend
  hosts: k8s
    #serial: 1
  gather_facts: false
  connection: local
  roles:
    - role: TENANT/env_vars
    - role: TENANT/trident_install
      tags: [trident_install]
      when: not ansible_check_mode
  tags:
    - trident_install
