apiVersion: v1
kind: Secret
metadata:
  name: backend-tbc-ontap-secret
  namespace: trident
type: Opaque
stringData:
  username: vsadmin
  password: "CHANGE_ME_TRIDENT_PASSWORD"  # Replace only in a private deployment overlay.
---
apiVersion: trident.netapp.io/v1
kind: TridentBackendConfig
metadata:
  name: backend-tbc-ontap-nas
  namespace: trident
spec:
  version: 1
  storageDriverName: ontap-nas
  managementLIF: "172.16.85.101"
  backendName: tbc-ontap-nas
  exportPolicy: default
  storagePrefix: "rosskastanie_"
  svm: "rosskastanie_svm"
  autoExportPolicy: true
  autoExportCIDRs: ["172.16.86.0/24"]
  credentials:
    name: backend-tbc-ontap-secret
